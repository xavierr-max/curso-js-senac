<!DOCTYPE html>

    <title>Tabuada</title>
    <link rel="stylesheet" href="../../css/12_03_2026/ex01.css">

<body>

    <main class="app-container">
        <header class="app-header">
            <h2>Tabuada</h2>
            <p class="subtitle">Insira um multiplicador para gerar os cálculos instantaneamente.</p>
        </header>

        <section class="controls-card">
            <div class="input-group">
                <label for="numero">Número base</label>
                <input type="number" id="numero" placeholder="Ex: 7">
            </div>
            <button onclick="Criar()">Gerar Resultados</button>
        </section>

        <section class="results-section">
            <h3 class="section-title">Cálculos</h3>
            <ul id="resultado">
                </ul>
        </section>
    </main>
