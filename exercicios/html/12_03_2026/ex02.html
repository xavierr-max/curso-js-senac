<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Média de Notas</title>
    <link rel="stylesheet" href="../../css/12_03_2026/ex02.css">
</head>
<body>

    <main class="app-container">
        <header class="app-header">
            <h2>Média de Notas</h2>
            <p class="subtitle">Adicione as notas uma a uma para calcular o resultado final.</p>
        </header>

        <section class="controls-card">
            <div class="input-group">
                <label for="valor">Insira a nota</label>
                <input type="number" id="valor" placeholder="Ex: 8.5" step="0.1">
            </div>
            
            <div class="button-group">
                <button class="btn-primary" onclick="Adicionar()">Adicionar Nota</button>
                <button class="btn-secondary" onclick="Calcular()">Calcular Média</button>
            </div>
        </section>

        <section class="results-section">
            <h3 class="section-title">Progresso e Resultado</h3>
            <div class="result-card">
                <p id="resultado"></p>
            </div>
        </section>
    </main>

    <script src="../../js/12_03_2026/ex02.js"></script>
</body>
</html>
